  <line x1="10.1" y1="7"   x2="13.5" y2="7"   stroke="url(#grad)" stroke-width="1" stroke-linecap="round"/>
  <line x1="9.9"  y1="9.5" x2="12.5" y2="9.5" stroke="url(#grad)" stroke-width="1" stroke-linecap="round"/>
