<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="grad" x1="0" y1="2.5" x2="0" y2="13.5" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#F8D727"/>
      <stop offset="1"   stop-color="#0095FF"/>
    </linearGradient>
